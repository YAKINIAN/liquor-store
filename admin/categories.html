<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Categories - Admin Dashboard</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <!-- Security check -->
    <script src="js/admin.js"></script>
</head>

<body>
    <div class="admin-wrapper">

        <!-- SIDEBAR -->
        <div id="sidebar-container"></div>

        <div class="main">

            <div class="header">
                <button class="btn btn-dark d-lg-none" id="toggleSidebar"><i class="fa fa-bars"></i></button>
                <h2>🥂 Categories</h2>
                <button class="btn btn-danger" onclick="openAddModal()">+ Add Category</button>
            </div>

            <div class="dashboard-cards">
                <div class="stat-card">
                    <h3 id="totalCatCount">0</h3>
                    <p>📂 Total Categories</p>
                </div>
            </div>

            <div class="table-wrapper">
                <h4 class="mb-3">Category List</h4>
                <table class="table align-middle">
                    <thead>
                        <tr><th>#</th><th>Category Name</th><th>Slug</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="categoryTableBody"></tbody>
                </table>
            </div>

        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="catModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title" id="catModalTitle">Add Category</h5>
                    <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editIndex" value="">
                    <div class="mb-3">
                        <label class="form-label">Display Name *</label>
                        <input class="form-control" id="catName" placeholder="e.g. Whisky">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Slug * <small class="text-muted">(used for filtering)</small></label>
                        <input class="form-control" id="catSlug" placeholder="e.g. whisky">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-danger" onclick="saveCategory()">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="js/layout.js"></script>
    <script>
        const STORAGE_KEY = "admin_categories";
        const DEFAULT_CATEGORIES = [
            { name: "Whisky", slug: "whisky" },
            { name: "Wine", slug: "wine" },
            { name: "Vodka", slug: "vodka" },
            { name: "Gin", slug: "gin" },
            { name: "Beer", slug: "beer" }
        ];

        let catModal;

        function getCategories() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (!stored) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(DEFAULT_CATEGORIES));
                return DEFAULT_CATEGORIES;
            }
            return JSON.parse(stored);
        }

        function saveCategories(cats) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(cats));
        }

        function renderTable() {
            const cats = getCategories();
            document.getElementById("totalCatCount").textContent = cats.length;
            document.getElementById("categoryTableBody").innerHTML = cats.map((c, i) => `
                <tr>
                    <td>${i + 1}</td>
                    <td>${c.name}</td>
                    <td><code>${c.slug}</code></td>
                    <td>
                        <button class="btn btn-primary btn-sm me-1" onclick="openEditModal(${i})"><i class="fa fa-edit"></i> Edit</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteCategory(${i})"><i class="fa fa-trash"></i> Delete</button>
                    </td>
                </tr>
            `).join("");
        }

        function openAddModal() {
            document.getElementById("catModalTitle").textContent = "Add Category";
            document.getElementById("editIndex").value = "";
            document.getElementById("catName").value = "";
            document.getElementById("catSlug").value = "";
            catModal.show();
        }

        function openEditModal(i) {
            const cat = getCategories()[i];
            document.getElementById("catModalTitle").textContent = "Edit Category";
            document.getElementById("editIndex").value = i;
            document.getElementById("catName").value = cat.name;
            document.getElementById("catSlug").value = cat.slug;
            catModal.show();
        }

        function saveCategory() {
            const name = document.getElementById("catName").value.trim();
            const slug = document.getElementById("catSlug").value.trim().toLowerCase().replace(/\s+/g, "-");
            if (!name || !slug) { alert("Both fields are required."); return; }

            const cats = getCategories();
            const idx = document.getElementById("editIndex").value;

            if (idx !== "") {
                cats[parseInt(idx)] = { name, slug };
            } else {
                cats.push({ name, slug });
            }

            saveCategories(cats);
            catModal.hide();
            renderTable();
        }

        function deleteCategory(i) {
            if (!confirm("Delete this category?")) return;
            const cats = getCategories();
            cats.splice(i, 1);
            saveCategories(cats);
            renderTable();
        }

        document.addEventListener("DOMContentLoaded", () => {
            catModal = new bootstrap.Modal(document.getElementById("catModal"));
            renderTable();
        });
    </script>
</body>

</html>
