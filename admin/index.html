<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrator Dashboard - Liquor Store</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Admin CSS -->
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/responsive.css">

    <!-- Auth security early check -->
    <script src="js/admin.js"></script>
</head>

<body>

    <div class="admin-wrapper">

        <!-- Sidebar -->
        <div id="sidebar-container"></div>

        <!-- Main Content -->
        <div class="main">
            <div class="header d-flex justify-content-between align-items-center mb-4">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-dark d-lg-none" id="toggleSidebar">
                        <i class="fa fa-bars"></i>
                    </button>
                    <h2 class="mb-0">Dashboard Overview</h2>
                </div>

                <div class="d-flex align-items-center gap-2">
                    <span class="text-muted small">Welcome, <strong class="text-dark" id="adminUsername">Admin</strong></span>
                </div>
            </div>

            <!-- Stats grid -->
            <div class="dashboard-cards mb-4">
                <div class="stat-card p-3 shadow-sm bg-white rounded border-start border-danger border-4">
                    <h3 id="statProducts" class="text-danger">0</h3>
                    <p class="text-muted mb-0">🍷 Total Products</p>
                </div>

                <div class="stat-card p-3 shadow-sm bg-white rounded border-start border-warning border-4">
                    <h3 id="statOrders" class="text-warning">0</h3>
                    <p class="text-muted mb-0">📦 Total Orders</p>
                </div>

                <div class="stat-card p-3 shadow-sm bg-white rounded border-start border-primary border-4">
                    <h3 id="statCustomers" class="text-primary">0</h3>
                    <p class="text-muted mb-0">👥 Customers</p>
                </div>

                <div class="stat-card p-3 shadow-sm bg-white rounded border-start border-success border-4">
                    <h3 id="statRevenue" class="text-success">KES 0</h3>
                    <p class="text-muted mb-0">💰 Net Revenue</p>
                </div>
            </div>

            <!-- Recent Orders Section -->
            <div class="table-wrapper bg-white p-3 rounded shadow-sm">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="mb-0">📦 Recent Order Operations</h4>
                    <a href="orders.html" class="btn btn-sm btn-outline-danger">View All Orders</a>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Customer ID</th>
                                <th>Items</th>
                                <th>Total Price</th>
                                <th>Order Status</th>
                            </tr>
                        </thead>
                        <tbody id="recentOrdersBody">
                            <tr>
                                <td colspan="5" class="text-center py-4 text-muted">
                                    Loading dashboard summaries...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>

    </div>

    <!-- Bootstrap & Custom scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/dashboard.js"></script>

</body>

</html>
