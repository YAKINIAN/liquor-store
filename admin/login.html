<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Liquor Store</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<section class="login-page">
    <div class="login-card">
        <div class="text-center mb-4">
            <h2>🍷 Liquor Admin</h2>
            <p>Login to manage your store</p>
        </div>

        <div id="loginError" style="display:none; background:rgba(255,77,77,.15); border:1px solid #ff4d4d; color:#ff6b6b; padding:10px 14px; border-radius:8px; margin-bottom:15px; font-size:14px;"></div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="email" placeholder="Enter email" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-danger w-100">Login</button>
        </form>
    </div>
</section>

<script src="../js/config.js"></script>
<script src="js/login.js"></script>
</body>
</html>
