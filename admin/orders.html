<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders - Admin Dashboard</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Admin CSS -->
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/responsive.css">

    <!-- Security Auth check -->
    <script src="js/admin.js"></script>
</head>

<body>
    <div class="admin-wrapper">
        <!-- SIDEBAR -->
        <div id="sidebar-container"></div>

        <div class="main">

            <div class="header d-flex justify-content-between align-items-center mb-4">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-dark d-lg-none" id="toggleSidebar">
                        <i class="fa fa-bars"></i>
                    </button>
                    <h2 class="mb-0">📦 Manage Orders</h2>
                </div>
            </div>

            <!-- Stats summary -->
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <div class="stat-card p-3 shadow-sm bg-white rounded border-start border-warning border-4">
                        <span class="text-muted text-uppercase small">Pending Orders</span>
                        <h3 class="mb-0 text-warning" id="pendingOrdersCount">0</h3>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card p-3 shadow-sm bg-white rounded border-start border-info border-4">
                        <span class="text-muted text-uppercase small">Preparing Orders</span>
                        <h3 class="mb-0 text-info" id="preparingOrdersCount">0</h3>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card p-3 shadow-sm bg-white rounded border-start border-primary border-4">
                        <span class="text-muted text-uppercase small">On the Way</span>
                        <h3 class="mb-0 text-primary" id="onthewayOrdersCount">0</h3>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card p-3 shadow-sm bg-white rounded border-start border-success border-4">
                        <span class="text-muted text-uppercase small">Delivered / Paid</span>
                        <h3 class="mb-0 text-success" id="deliveredOrdersCount">0</h3>
                    </div>
                </div>
            </div>

            <div class="table-wrapper bg-white p-3 rounded shadow-sm">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Date</th>
                            <th>Items Details</th>
                            <th>Delivery Mode</th>
                            <th>Total Price</th>
                            <th>Payment Info</th>
                            <th>Current Status</th>
                            <th>Update Status</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody">
                        <tr>
                            <td colspan="8" class="text-center py-4">
                                <div class="spinner-border text-danger" role="status"></div>
                                <p class="mb-0 mt-2">Loading orders...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <!-- Bootstrap & Custom scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/orders.js"></script>
</body>

</html>
