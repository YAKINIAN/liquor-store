<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products - Admin Dashboard</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Admin CSS -->
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <!-- Auth Security check (executes early to prevent flash of content) -->
    <script src="js/admin.js"></script>
</head>

<body>

    <div class="admin-wrapper">

        <!-- SIDEBAR -->
        <div id="sidebar-container"></div>

        <div class="main">

            <div class="header d-flex justify-content-between align-items-center mb-4">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-dark d-lg-none" id="toggleSidebar">
                        <i class="fa fa-bars"></i>
                    </button>
                    <h2 class="mb-0">🍷 Manage Products</h2>
                </div>

                <button class="btn btn-danger" onclick="openAddModal()">
                    <i class="fa fa-plus me-1"></i> Add Product
                </button>
            </div>

            <!-- Dashboard Stats Summary -->
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="stat-card p-3 shadow-sm bg-white rounded border-start border-danger border-4">
                        <span class="text-muted text-uppercase small">Total Catalog Products</span>
                        <h3 class="mb-0" id="totalProductsCount">0</h3>
                    </div>
                </div>
            </div>

            <div class="table-wrapper bg-white p-3 rounded shadow-sm">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>Product Name</th>
                            <th>Category</th>
                            <th>Brand</th>
                            <th>Price (KES)</th>
                            <th>Stock</th>
                            <th>Featured</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="productsTableBody">
                        <tr>
                            <td colspan="8" class="text-center py-4">
                                <div class="spinner-border text-danger" role="status"></div>
                                <p class="mb-0 mt-2">Loading products...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>

    </div>

    <!-- PRODUCT MODAL (ADD & EDIT) -->
    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title" id="modalTitle">Add Product</h5>
                    <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="productForm">
                        <input type="hidden" id="pId">
                        
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Product Name *</label>
                                <input class="form-control" id="pName" placeholder="e.g. Glenfiddich 12 Years" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Price (KES) *</label>
                                <input class="form-control" type="number" id="pPrice" placeholder="e.g. 6500" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Category *</label>
                                <select class="form-select" id="pCategory" required>
                                    <option value="" disabled selected>Select Category</option>
                                    <option value="whisky">Whisky</option>
                                    <option value="wine">Wine</option>
                                    <option value="vodka">Vodka</option>
                                    <option value="gin">Gin</option>
                                    <option value="beer">Beer</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Brand *</label>
                                <input class="form-control" id="pBrand" placeholder="e.g. Glenfiddich" required>
                            </div>
                            <div class="col-md-8">
                                <label class="form-label">Product Image *</label>
                                <input class="form-control" type="file" id="pImageFile" accept="image/*">
                                <div id="imagePreviewWrap" class="mt-2" style="display:none;">
                                    <img id="imagePreview" src="" alt="preview" style="height:80px;object-fit:contain;border-radius:6px;border:1px solid #ddd;">
                                </div>
                                <!-- holds the final URL after upload (or existing URL when editing) -->
                                <input type="hidden" id="pImage">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Stock Quantity</label>
                                <input class="form-control" type="number" id="pStock" placeholder="0" min="0" value="0">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Description</label>
                                <textarea class="form-control" id="pDescription" rows="3" placeholder="Describe the aroma, taste, ABV%, volume..."></textarea>
                            </div>
                            <div class="col-12">
                                <div class="form-check form-switch mt-2">
                                    <input class="form-check-input" type="checkbox" id="pFeatured">
                                    <label class="form-check-label" for="pFeatured">Feature this product on homepage slider</label>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-danger" id="saveProduct">Save Product</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap & Custom scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/products.js"></script>

</body>

</html>
