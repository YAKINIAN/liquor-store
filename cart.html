<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | Liquor Store</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style/theme.css">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/responsive.css">
    <style>
        body { background: #0f0f0f; }
        .cart-section { padding: 40px 0 60px; }
        .cart-section h2 { color: #d4af37; margin-bottom: 30px; }
        .cart-item { background: #1b1b1b; border: 1px solid #2a2a2a; border-radius: 12px; padding: 16px; transition: border-color 0.3s; }
        .cart-item:hover { border-color: rgba(212,175,55,0.3); }
        .cart-item h5 { color: #fff; margin-bottom: 2px; }
        .cart-item p { color: #aaa; margin: 0; }
        .cart-summary { background: #1b1b1b; border: 1px solid rgba(212,175,55,0.2); border-radius: 14px; padding: 24px; color: #fff; position: sticky; top: 80px; }
        .quantity-box { display: flex; align-items: center; }
        .quantity-box button { background: #d4af37; color: #111; border: none; width: 36px; height: 36px; font-size: 18px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
        .quantity-box button:hover { background: #f1c84c; }
        .quantity-box input { background: #111; color: #fff; border: 1px solid #333; width: 50px; height: 36px; text-align: center; font-size: 15px; }
    </style>
</head>
<body>

    <div id="site-nav"></div>

    <section class="cart-section">
        <div class="container">
            <h2>🛒 Shopping Cart</h2>
            <div class="row g-4">
                <div class="col-lg-8" id="cartItemsContainer"></div>
                <div class="col-lg-4">
                    <div class="cart-summary" id="cartSummary">
                        <p style="color:#aaa;text-align:center;">Loading cart...</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer id="site-footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/main.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
