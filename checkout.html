<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Liquor Store</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style/checkout.css">
    <link rel="stylesheet" href="style/responsive.css">
    <link rel="stylesheet" href="style/theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

    <div id="site-nav"></div>

    <div class="checkout-main-container container py-5 my-5">
        <div class="row justify-content-center">
            <div class="col-xl-9 col-lg-11 col-md-12">

                <div class="section-header text-center mb-5">
                    <h2>Checkout</h2>
                    <p>Complete your premium purchase</p>
                </div>

                <div class="theme-card p-4 p-md-5">
                    <form id="checkoutForm">
                        <div class="row g-5">

                            <!-- LEFT COLUMN: BILLING DETAILS -->
                            <div class="col-lg-7">
                                <h4 class="mb-4" style="color: var(--gold); border-bottom: 1px solid rgba(212, 175, 55, 0.25); padding-bottom: 10px;">Billing Details</h4>
                                
                                <div class="mb-3">
                                    <input id="fullName" type="text" class="form-control" placeholder="Full Name">
                                    <small id="fullNameError" class="error-text"></small>
                                </div>

                                <div class="mb-3">
                                    <input id="phoneNumber" type="text" class="form-control" placeholder="Phone Number (e.g. 07XXXXXXXX)">
                                    <small id="phoneError" class="error-text"></small>
                                </div>

                                <div class="mb-3">
                                    <select id="fulfillmentMethod" class="form-control">
                                        <option value="" disabled selected>Select Delivery / Pick from Store</option>
                                        <option value="delivery">Home Delivery (KES 200)</option>
                                        <option value="pickup">Pick from Store (Free)</option>
                                    </select>
                                </div>

                                <div id="deliveryAddressGroup" class="mb-3" style="display: none;">
                                    <input id="address" type="text" class="form-control" placeholder="Delivery Address">
                                    <small id="addressError" class="error-text"></small>
                                </div>

                                <div class="mb-4">
                                    <select id="paymentMethod" class="form-control">
                                        <option value="">Select Payment Method</option>
                                        <option value="mpesa">M-Pesa</option>
                                    </select>
                                    <small id="paymentError" class="error-text"></small>
                                </div>

                                <!-- Schedule Delivery -->
                                <div id="scheduleDeliveryGroup" class="schedule-section border-top pt-3 mt-3" style="border-color: rgba(255,255,255,0.05) !important; display: none;">
                                    <label class="checkbox-label mb-3">
                                        <input type="checkbox" id="scheduleDelivery" style="margin-bottom: 0;"> Schedule Delivery
                                    </label>
                                    <div id="scheduleFields" style="display:none;">
                                        <input type="date" id="deliveryDate" class="form-control mb-3">
                                        <select id="deliveryTime" class="form-control mb-3">
                                            <option value="">Select Delivery Slot</option>
                                            <option>12:00 AM - 2:00 AM</option>
                                            <option>2:00 AM - 4:00 AM</option>
                                            <option>4:00 AM - 6:00 AM</option>
                                            <option>6:00 AM - 8:00 AM</option>
                                            <option>8:00 AM - 10:00 AM</option>
                                            <option>10:00 AM - 12:00 PM</option>
                                            <option>12:00 PM - 2:00 PM</option>
                                            <option>2:00 PM - 4:00 PM</option>
                                            <option>4:00 PM - 6:00 PM</option>
                                            <option>6:00 PM - 8:00 PM</option>
                                            <option>8:00 PM - 10:00 PM</option>
                                            <option>10:00 PM - 12:00 AM</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <!-- RIGHT COLUMN: ORDER SUMMARY -->
                            <div class="col-lg-5 d-flex flex-column justify-content-between mt-5 mt-lg-0">
                                <div>
                                    <h4 class="mb-4" style="color: var(--gold); border-bottom: 1px solid rgba(212, 175, 55, 0.25); padding-bottom: 10px;">Order Summary</h4>
                                    
                                    <div id="checkoutItems" class="mb-4"></div>
                                    
                                    <div class="border-top pt-3" style="border-color: rgba(255,255,255,0.05) !important;">
                                        <p class="d-flex justify-content-between mb-2" style="font-size: 14px; color: var(--text-muted);">
                                            <span>Subtotal</span><span id="subtotal" style="color: #fff;">KES 0</span>
                                        </p>
                                        <p class="d-flex justify-content-between mb-2" style="font-size: 14px; color: var(--text-muted);">
                                            <span>Delivery</span><span id="deliveryFee" style="color: #fff;">KES 200</span>
                                        </p>
                                        <div class="border-top my-3" style="border-color: rgba(255,255,255,0.05) !important;"></div>
                                        <h5 class="d-flex justify-content-between align-items-center">
                                            <span style="font-size: 18px;">Total</span>
                                            <span id="total" style="color: var(--gold); font-size: 22px; font-weight: 700;">KES 0</span>
                                        </h5>
                                    </div>
                                </div>

                                <div class="mt-4">
                                    <button id="placeOrderBtn" class="btn btn-gold w-100" type="submit" disabled>
                                        <span id="btnText">Place Order</span>
                                    </button>
                                </div>
                            </div>

                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <footer id="site-footer"></footer>

    <!-- PAYMENT MODAL -->
    <div id="paymentModal" class="payment-modal">
        <div class="payment-box">
            <div id="paymentStatus">
                <div class="spinner"></div>
                <h3>Waiting for Payment</h3>
                <p>Check your phone and enter your M-Pesa PIN to complete payment.</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/main.js"></script>
    <script src="js/checkout.js"></script>
</body>
</html>
