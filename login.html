<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Liquor Store</title>
    <link rel="stylesheet" href="style/login.css">
    <link rel="stylesheet" href="style/theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="login-page">
    <div class="login-overlay"></div>
    <div class="login-card">

        <div class="brand">
            <i class="fa-solid fa-wine-glass"></i>
            <h1>Liquor Store</h1>
            <p>Premium Wines • Whisky • Vodka • Gin</p>
        </div>

        <h2>Welcome Back</h2>

        <div id="loginError" class="login-error"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="login-btn">
                <span id="loginBtnText">Login</span>
            </button>
        </form>

        <div class="links"><a href="forgotpassword.html">Forgot Password?</a></div>
        <div class="signup-link">Don't have an account? <a href="signup.html">Create Account</a></div>

    </div>
</div>

<script src="js/config.js"></script>
<script src="js/layout.js"></script>
<script src="js/main.js"></script>
<script>
// Override loginForm handler to use the new error div instead of alert
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtnText');
    const errEl = document.getElementById('loginError');
    errEl.style.display = 'none';
    btn.textContent = 'Signing in...';

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
        const res = await fetch('http://localhost:5001/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (res.ok && data.token) {
            localStorage.setItem('user', JSON.stringify(data.user));
            localStorage.setItem('token', data.token);
            btn.textContent = '✅ Success!';
            const redirect = localStorage.getItem('redirectAfterLogin');
            setTimeout(() => {
                if (redirect) { localStorage.removeItem('redirectAfterLogin'); window.location.href = redirect; }
                else window.location.href = 'index.html';
            }, 600);
        } else {
            errEl.textContent = data.message || 'Login failed';
            errEl.style.display = 'block';
            btn.textContent = 'Login';
        }
    } catch (err) {
        errEl.textContent = 'Cannot connect to server';
        errEl.style.display = 'block';
        btn.textContent = 'Login';
    }
}, { once: false });
</script>
</body>
</html>
