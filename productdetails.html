<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Liquor Store</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style/theme.css">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/responsive.css">
</head>

<body class="product-details-page">

    <div id="site-nav"></div>

    <!-- Product Details -->
    <section class="product-details py-5">

        <div class="container">

            <div class="row g-5">

                <!-- Left Image -->
                <div class="col-lg-6">

                    <div class="main-image">

                        <img id="productImage" src="" class="img-fluid rounded">

                    </div>

                    <!-- Small Gallery -->
                    <div class="thumbnail-images mt-3">
                        <img src="" alt="">
                        <img src="" alt="">
                        <img src="" alt="">
                    </div>

                </div>

                <!-- Product Info -->
                <div class="col-lg-6">

                    <span class="product-category" id="productCategory"></span>

                    <h1 class="product-title" id="productName"></h1>

                    <h3 class="product-price" id="productPrice"></h3>

                    <p class="product-description" id="productDescription"></p>

                    <!-- Quantity -->
                    <div class="quantity-box">

                        <button>-</button>

                        <input type="text" value="1">

                        <button>+</button>

                    </div>

                    <!-- Buttons -->
                    <div class="d-flex gap-3 mt-4">

                        <button class="btn btn-dark btn-lg" onclick="addToCart()">
                            Add To Cart
                        </button>

                        <button class="btn btn-danger btn-lg" onclick="buyNow()">
                            Buy Now
                        </button>

                    </div>

                    <!-- Product Meta -->
                    <div class="product-meta mt-4">

                        <p>
                            <strong>Category:</strong>
                            Wines
                        </p>

                        <p>
                            <strong>SKU:</strong>
                            WN1023
                        </p>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- Related Products -->
    <section class="related-products py-5">

        <div class="container">

            <div class="section-header">
                <h2>Related Products</h2>
            </div>

            <div class="row g-4" id="relatedGrid">
                <!-- Loaded dynamically by productdetails.js -->
            </div>

        </div>

    </section>

    <footer id="site-footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/main.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/productdetails.js"></script>

</body>
</html>
