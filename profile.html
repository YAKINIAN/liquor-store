<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account | Liquor Store</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style/theme.css">
    <link rel="stylesheet" href="style/style.css">
    <style>
        body { background: #f8f9fa; }
        .profile-card { max-width: 560px; margin: 60px auto; background: #fff; border-radius: 16px; padding: 40px; box-shadow: 0 5px 30px rgba(0,0,0,.08); }
        .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: #111; color: #d4af37; font-size: 32px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
        .profile-card h3 { text-align: center; margin-bottom: 5px; }
        .profile-card .role-wrap { text-align: center; margin-bottom: 30px; }
        #profileMsg { display: none; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div id="site-nav"></div>

    <div class="container py-5">
        <div class="profile-card">
            <div class="profile-avatar"><i class="fa fa-user"></i></div>
            <h3 id="profileName">Loading...</h3>
            <div class="role-wrap"><span class="badge bg-dark" id="profileRole"></span></div>

            <form id="profileForm">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Full Name</label>
                    <input type="text" id="nameInput" class="form-control" placeholder="Your name">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email Address</label>
                    <input type="email" id="emailInput" class="form-control" disabled>
                </div>
                <hr>
                <p class="fw-semibold mb-3">Change Password <small class="text-muted fw-normal">(leave blank to keep current)</small></p>
                <div class="mb-3">
                    <label class="form-label fw-semibold">New Password</label>
                    <input type="password" id="newPassword" class="form-control" placeholder="New password">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Confirm New Password</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm new password">
                </div>
                <div id="profileMsg" class="alert" role="alert"></div>
                <div class="d-flex gap-2 mt-2">
                    <button type="submit" class="btn btn-dark flex-fill">Save Changes</button>
                    <a href="orders.html" class="btn btn-outline-dark flex-fill">My Orders</a>
                </div>
            </form>
        </div>
    </div>

    <footer id="site-footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/main.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
