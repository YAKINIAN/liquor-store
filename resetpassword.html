<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Liquor Store</title>
    <link rel="stylesheet" href="style/signup.css">
    <link rel="stylesheet" href="style/theme.css">
    <link rel="stylesheet" href="style/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-overlay"></div>
        <div class="auth-card">
            <div class="brand">
                <i class="fa-solid fa-wine-glass"></i>
                <h1>Liquor Store</h1>
                <p>Set a new password</p>
            </div>
            <h2>Reset Password</h2>
            <form id="resetForm">
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="password" placeholder="At least 6 characters" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Repeat new password" required>
                </div>
                <button type="submit" class="btn">Set New Password</button>
            </form>
            <div id="resetMsg" style="display:none;" class="alert"></div>
            <p class="switch"><a href="login.html">Back to Login</a></p>
        </div>
    </div>
    <script src="js/config.js"></script>
    <script src="js/layout.js"></script>
    <script>
        const token = new URLSearchParams(window.location.search).get("token");
        const msg = document.getElementById("resetMsg");

        if (!token) {
            msg.style.display = "block";
            msg.className = "alert alert-danger mt-3";
            msg.textContent = "Invalid or missing reset link. Please request a new one.";
            document.getElementById("resetForm").style.display = "none";
        }

        document.getElementById("resetForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const password = document.getElementById("password").value;
            const confirm  = document.getElementById("confirmPassword").value;
            const btn = e.target.querySelector("button");

            if (password !== confirm) {
                msg.style.display = "block";
                msg.className = "alert alert-danger mt-3";
                msg.textContent = "Passwords do not match.";
                return;
            }

            btn.disabled = true;
            btn.textContent = "Updating...";

            try {
                const res = await fetch(`${API_BASE}/api/auth/reset-password`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token, password })
                });
                const data = await res.json();
                msg.style.display = "block";
                if (res.ok) {
                    msg.className = "alert alert-success mt-3";
                    msg.textContent = "Password updated! Redirecting to login...";
                    setTimeout(() => window.location.href = "login.html", 2000);
                } else {
                    msg.className = "alert alert-danger mt-3";
                    msg.textContent = data.message || "Something went wrong.";
                    btn.disabled = false;
                    btn.textContent = "Set New Password";
                }
            } catch {
                msg.style.display = "block";
                msg.className = "alert alert-danger mt-3";
                msg.textContent = "Cannot connect to server.";
                btn.disabled = false;
                btn.textContent = "Set New Password";
            }
        });
    </script>
</body>
</html>
