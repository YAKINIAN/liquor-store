<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Liquor Store</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../style/theme.css">
    <link rel="stylesheet" href="shop.css">
</head>
<body>

    <!-- NAVBAR -->
    <div id="site-nav"></div>

    <!-- HERO -->
    <section class="hero">
        <div class="hero-overlay">
            <h1>Premium Drinks Delivered</h1>
            <p>Fast delivery across Nairobi & surrounding areas</p>
            <a href="#shop" class="btn">Shop Now</a>
        </div>
    </section>

    <!-- MAIN LAYOUT -->
    <div class="container shop-layout-container">
        <aside class="sidebar">
            <h3>Categories</h3>
            <div id="categoryButtons"></div>
        </aside>

        <main class="products-area">
            <input type="text" id="search" placeholder="Search products..." style="width:100%;padding:10px 14px;margin-bottom:20px;border-radius:8px;border:1px solid #444;background:#1b1b1b;color:#fff;font-size:15px;">
            <div class="products" id="shop"></div>
        </main>
    </div>

    <!-- DELIVERY BANNER -->
    <section class="delivery">🚚 Delivery in 30–60 Minutes | 📅 Schedule Available</section>

    <!-- FOOTER -->
    <footer id="site-footer"></footer>

    <script>window.PAGE_ROOT = '../';</script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/cart.js"></script>
    <script src="shop.js"></script>
</body>
</html>
